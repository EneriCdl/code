<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EN - 我的世界建筑&机器教程</title>
    <meta name="description" content="EN - 我的世界建筑教程和生电机器教程，包含刷石机、刷铁机、村民繁殖机、现代别墅、中世纪城堡等图文教程和B站视频链接">
    <link rel="stylesheet" href="css/mc-style.css">
</head>
<body>

    <!-- Minecraft 像素背景画布 -->
    <canvas id="mc-bg-canvas"></canvas>

    <!-- ==================== 登录/注册页面 ==================== -->
    <div id="view-login" class="view active">
        <div class="login-container">
            <div class="login-box">
                <div class="login-icon">⛏️</div>
                <h1>E N</h1>
                <p class="login-subtitle">我的世界 · 建筑&生电教程</p>

                <div class="form-group">
                    <label class="form-label">👤 账号</label>
                    <input type="text" class="mc-input" id="login-username" placeholder="请输入账号名" maxlength="16" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">🔒 密码</label>
                    <input type="password" class="mc-input" id="login-password" placeholder="请输入密码" maxlength="32">
                </div>
                <div id="register-fields" style="display:none;">
                    <div class="form-group">
                        <label class="form-label">🔒 确认密码</label>
                        <input type="password" class="mc-input" id="login-password2" placeholder="请再次输入密码" maxlength="32">
                    </div>
                </div>

                <p class="form-error" id="login-error"></p>

                <button class="mc-btn gold large" id="login-submit" style="width:100%;">登 录</button>

                <p class="form-switch">
                    <a id="login-switch">还没有账号？点此注册</a>
                </p>
            </div>
        </div>
    </div>

    <!-- ==================== 主界面 ==================== -->
    <div id="view-main" class="view">

        <!-- 顶部导航栏 (Minecraft Hotbar 风格) -->
        <nav class="mc-navbar">
            <div class="nav-brand">⛏️ EN</div>
            <div class="nav-links">
                <button class="nav-link active" id="nav-home">
                    <span class="nav-icon">🏠</span> 首页
                </button>
                <button class="nav-link" id="nav-search">
                    <span class="nav-icon">🔍</span> 搜索
                </button>
                <button class="nav-link" id="nav-todolist">
                    <span class="nav-icon">📋</span> 待建清单
                </button>
            </div>
            <div class="nav-user">
                👤 <span id="nav-username">---</span>
                <button class="mc-btn red small" id="nav-logout">退出</button>
            </div>
        </nav>

        <!-- 首页 -->
        <div id="sub-home" class="sub-view active">
            <div class="main-content">

                <!-- 欢迎区域 -->
                <div class="detail-hero" style="margin-bottom:20px;">
                    <div class="detail-icon">🏗️</div>
                    <h2>欢迎来到 EN</h2>
                    <p style="color:#ccc;font-size:14px;margin-top:8px;">这里有最全的我的世界建筑教程、生电机器和材质光影资源</p>
                </div>

                <!-- 快捷导航按钮 -->
                <div class="hero-nav">
                  <button class="hero-nav-btn hero-nav-btn-green" data-action="hero-tutorials">
                    <span class="hero-nav-icon">🏗️</span>
                    <span class="hero-nav-text">
                      <span class="hero-nav-title">建筑与生电教程</span>
                      <span class="hero-nav-sub">25+机器教程 · 25+建筑教程</span>
                    </span>
                    <span class="hero-nav-arrow">▶</span>
                  </button>
                  <button class="hero-nav-btn hero-nav-btn-blue" data-action="hero-resources">
                    <span class="hero-nav-icon">🎨</span>
                    <span class="hero-nav-text">
                      <span class="hero-nav-title">材质包与光影下载</span>
                      <span class="hero-nav-sub">12款精选资源 · 一键下载</span>
                    </span>
                    <span class="hero-nav-arrow">▶</span>
                  </button>
                </div>

                <!-- 热门推荐 -->
                <h2 class="section-title">⭐ 热门推荐</h2>
                <div class="card-grid" id="home-featured-grid"></div>

                <!-- 建筑与生电（选项卡切换） -->
                <h2 class="section-title" id="section-tutorials">🏗️ 建筑与生电</h2>
                <div class="mc-tabs">
                  <button class="mc-tab active" data-tab="machines">⚙️ 生电科技</button>
                  <button class="mc-tab" data-tab="buildings">🏛️ 建筑美学</button>
                </div>
                <div class="version-filters" id="version-filters-tutorials"></div>
                <div class="card-grid tab-panel active" id="home-machines-grid"></div>
                <div class="card-grid tab-panel" id="home-buildings-grid"></div>

                <!-- 材质包与光影 -->
                <h2 class="section-title" id="section-resources">🎨 材质包与光影</h2>
                <div class="version-filters" id="version-filters-resources"></div>
                <div class="card-grid" id="home-resources-grid"></div>
            </div>

            <!-- 底部 -->
            <footer class="mc-footer">
                <p>⛏️ EN — 我的世界建筑&生电教程平台</p>
                <div class="footer-links">
                    <a href="https://github.com/EneriCdl/code" target="_blank" rel="noopener">
                        📦 GitHub: EneriCdl/code
                    </a>
                    <a href="https://www.minecraft.net/" target="_blank" rel="noopener">
                        🌐 Minecraft 官网
                    </a>
                    <a href="https://search.bilibili.com/all?keyword=%E6%88%91%E7%9A%84%E4%B8%96%E7%95%8C%E6%95%99%E7%A8%8B" target="_blank" rel="noopener">
                        📺 B站MC教程
                    </a>
                </div>
                <p style="margin-top:12px;font-size:10px;">Made with ❤️ | EN &copy; 2026</p>
            </footer>
        </div>

        <!-- 搜索页 -->
        <div id="sub-search" class="sub-view">
            <div class="main-content">
                <h2 class="section-title">🔍 搜索教程</h2>
                <div class="search-section">
                    <div class="search-bar">
                        <input type="text" class="mc-input" id="search-input" placeholder="搜索... 例如：1.21.4 刷石机 / 城堡 / 农场">
                        <button class="mc-btn gold" id="search-btn">🔍 搜索</button>
                    </div>
                    <div class="search-filters" id="filter-categories"></div>
                    <div class="search-filters" id="filter-difficulties"></div>
                </div>
                <div id="search-results"></div>
            </div>
        </div>

        <!-- 详情页 -->
        <div id="sub-detail" class="sub-view">
            <div class="main-content detail-container" id="detail-content"></div>
        </div>

        <!-- 待建清单 -->
        <div id="sub-todolist" class="sub-view">
            <div class="main-content todolist-container" id="todolist-content"></div>
        </div>
    </div>

    <!-- ==================== Scripts ==================== -->
    <script src="js/mc-smoothscroll.js"></script>
    <script src="js/mc-background.js"></script>
    <script src="js/mc-data.js"></script>
    <script src="js/mc-app.js"></script>
</body>
</html>
